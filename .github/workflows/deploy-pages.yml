name: Deploy preview to GitHub Pages

on:
  push:
    branches: [claude/peaceful-faraday-zlzdty]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (under the /interactivemap/ subpath)
        run: npm run build
        env:
          VITE_BASE: /interactivemap/
          # Supabase *publishable* key — public by design (it ships in the client bundle on any
          # deploy) and read-only via RLS, so it's safe in the workflow. Rotate / move to repo
          # secrets at the Phase 10 production deploy.
          VITE_SUPABASE_URL: https://mnvntttootxbbbnsnvke.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_TLnFfdFCkX0_NoLFenvEqA_MGqjWmqV
          # Cloudinary (optional) — enables the admin "Upload photo" button for panoramas. Both are
          # PUBLIC values (unsigned preset). Fill them in to turn uploads on; blank = paste-a-URL.
          VITE_CLOUDINARY_CLOUD_NAME: ''
          VITE_CLOUDINARY_UPLOAD_PRESET: ''
      # SPA fallback so deep links / refresh work on GitHub Pages.
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
