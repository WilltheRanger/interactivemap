<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#582c83" />
    <!-- Standalone (Add to Home Screen) behavior + status-bar style on iOS/Android. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DBHS Wayfinder" />
    <meta
      name="description"
      content="DBHS Wayfinder — find your classrooms and locker on an interactive campus map."
    />
    <title>DBHS Wayfinder</title>
    <!-- Set the theme before first paint to avoid a flash. Key mirrors THEME_KEY in src/lib/theme.ts. -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var p = localStorage.getItem('dbhs-wayfinder:theme');
          var dark =
            p === 'dark' ||
            ((!p || p === 'system') && matchMedia('(prefers-color-scheme: dark)').matches);
          root.dataset.theme = dark ? 'dark' : 'light';
          var ts = localStorage.getItem('dbhs-wayfinder:text-size');
          if (ts === 'large') root.style.fontSize = '112.5%';
          else if (ts === 'larger') root.style.fontSize = '125%';
          if (localStorage.getItem('dbhs-wayfinder:contrast') === 'high')
            root.dataset.contrast = 'high';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Static fallback: replaced the moment React mounts. If it sticks around, the JS bundle
           failed to load (bad connection / unsupported browser) — give people a next step. -->
      <div class="boot-fallback">
        <p>Loading DBHS Wayfinder…</p>
        <p class="boot-fallback__hint">
          If this doesn't go away, check your connection and refresh.
        </p>
      </div>
    </div>
    <noscript>
      <div class="boot-fallback">
        <p>DBHS Wayfinder needs JavaScript — enable it and refresh the page.</p>
      </div>
    </noscript>
    <style>
      /* Styles for the pre-React fallbacks only; theme-aware via the data-theme set above. */
      .boot-fallback {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 24px;
        text-align: center;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #1f2433;
        background: #eaebef;
      }
      :root[data-theme='dark'] .boot-fallback {
        color: #f2f3f5;
        background: #14151a;
      }
      .boot-fallback__hint {
        font-size: 13px;
        opacity: 0.7;
      }
      .boot-fallback button {
        margin-top: 8px;
        padding: 10px 20px;
        border: 0;
        border-radius: 10px;
        background: #f4b41a;
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
